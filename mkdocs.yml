site_name: 南安一中校园Wiki
site_url: http://nayz-wiki.daoxiang.xyz
site_description: 记录南安一中的历史、人物与大事
site_author: 南安一中校友
copyright: Copyright &copy; 2024 南安一中校园Wiki
theme:
  name: material
  language: zh
  favicon: assets/images/favicon.png
  icon:
    logo: material/book-open-variant
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.indexes
  - navigation.top
  - toc.integrate
  - search.suggest
  - search.highlight
  - content.tabs.link
  - content.code.annotation
  - content.code.copy
  palette:
  - scheme: default
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-7
      name: 切换暗色模式
  - scheme: slate
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-4
      name: 切换亮色模式
plugins:
- search:
    lang:
    - zh
    - en
markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji ''
    emoji_generator: !!python/name:material.extensions.emoji.to_svg ''
- footnotes
- attr_list
- def_list
- tables
- toc:
    permalink: true
nav:
- 首页: index.md
- 人物志:
  - 介绍: pintro.md
  - lh: lh.md
- 大事记:
  - 介绍: eintro.md
  - 手抓饼事件: eat.md
- - 其他:
    - github-sync-test: github-sync-test.md
extra:
  social:
  - icon: fontawesome/solid/envelope
    link: mailto:admin@nayz-wiki.daoxiang.xyz
    name: 联系我们
  generator: false
  analytics:
    provider: google
    property: G-XXXXXXXXXX
